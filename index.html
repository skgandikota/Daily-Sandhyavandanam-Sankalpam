<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sankalpam - London</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #fff8e1; color: #3e2723; padding: 20px; text-align: center; }
        .container { max-width: 700px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 10px solid #e65100; }
        .lang-selector { margin-bottom: 25px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        button { padding: 10px 18px; border: 1px solid #ddd; border-radius: 25px; cursor: pointer; background: #efebe9; font-weight: bold; transition: 0.3s; }
        button.active { background: #e65100; color: white; border-color: #e65100; }
        .mantra-display { background: #fafafa; padding: 25px; border-radius: 15px; border: 1px dashed #bcaaa4; font-size: 1.4rem; line-height: 2.2; min-height: 200px; text-align: justify; direction: ltr; }
        .highlight { color: #bf360c; font-weight: bold; }
        .info { margin-top: 15px; font-size: 0.9rem; color: #8d6e63; }
        #loading { color: #e65100; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>Daily Sankalpam (London)</h2>
    
    <div class="lang-selector">
        <button id="btn-devanagari" onclick="setLanguage('Devanagari')" class="active">Sanskrit</button>
        <button id="btn-telugu" onclick="setLanguage('Telugu')">తెలుగు</button>
        <button id="btn-kannada" onclick="setLanguage('Kannada')">ಕನ್ನಡ</button>
    </div>

    <div class="mantra-display" id="output">
        <span id="loading">Initializing Panchangam...</span>
    </div>

    <div class="info">
        Location: London, UK | <b>Mama Upaatta</b> Correction Active
    </div>
</div>

<script type="module">
    import { getPanchangam, Observer } from 'https://cdn.jsdelivr.net/npm/@ishubhamx/panchangam-js/+esm';

    let currentLanguage = 'Devanagari';
    let cachedSanskritText = "";

    async function updateSankalpam() {
        try {
            const now = new Date();
            const obs = new Observer(51.5074, -0.1278, 11); // London Coordinates
            const p = getPanchangam(now, obs, { timezoneOffset: now.getTimezoneOffset() * -1 });

            cachedSanskritText = `अद्य ब्रह्मणः द्वितीया परार्धे, श्वेत वराह कल्पे, वैवस्वत मन्वंतरे, कलियुगे प्रथमपादे, कुशद्वीपे, वरुण दिग्भागे, ब्रिटानिया देशे, लंडन महानगरे, टेम्स नदी तीरे, अस्मिन् वर्तमाने व्यवहारिके चांद्रमानेन ${p.samvatsara.name} नाम संवत्सरे, ${p.ayana}, ${p.ritu} ऋतौ, ${p.month.name} मासे, ${p.paksha} पक्षे, ${p.tithi.name} तिथौ, ${p.vara} वासरे, ${p.nakshatra.name} नक्षत्र युक्तायाम्, शुभयोग शुभकरण एवं गुण विशेषण विशिष्टायां अस्यां श्री शुभतिथौ मम उपात्त समस्त दुरितक्षय द्वारा श्री परमेश्वर प्रीत्यर्थं प्रातः संध्यामुपाशिष्ये।`;

            renderText();
        } catch (e) {
            document.getElementById('output').innerText = "Error loading Panchang: " + e.message;
        }
    }

    async function renderText() {
        const outputDiv = document.getElementById('output');
        
        if (currentLanguage === 'Devanagari') {
            outputDiv.innerText = cachedSanskritText;
        } else {
            outputDiv.innerHTML = '<span id="loading">Translating to ' + currentLanguage + '...</span>';
            try {
                // Using Aksharamukha API with fallback
                const response = await fetch(`https://api.sumanth.it/transliterate?target=${currentLanguage.toLowerCase()}&text=${encodeURIComponent(cachedSanskritText)}`);
                if (!response.ok) throw new Error("API Limit");
                const data = await response.json();
                outputDiv.innerText = data.result;
            } catch (err) {
                // Simple Alert if the external API fails
                outputDiv.innerHTML = cachedSanskritText + `<br><small>(Translation Service Unavailable - Showing Sanskrit)</small>`;
            }
        }
    }

    // Attach to window so buttons can find them
    window.setLanguage = (lang) => {
        currentLanguage = lang;
        document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
        document.getElementById(`btn-${lang.toLowerCase()}`).classList.add('active');
        renderText();
    };

    updateSankalpam();
</script>

</body>
</html>
